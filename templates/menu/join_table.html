{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Table {{ table_number }} | {{ restaurant.restaurant_name|default:"Flavoria" }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* Same design tokens as landing.html, for visual continuity */
:root{
  --bg:#faf8f5; --card:#ffffff; --text:#2b2420; --muted:#92897e;
  --orange:#ef6f1f; --orange-light:#ff9a4d; --orange-pale:#fbe6d6; --orange-deep:#c8550e;
  --border:#f0eae1; --danger:#e0432b; --danger-bg:#fdecea;
  --shadow-md:0 8px 28px rgba(43,36,32,0.10);
  --shadow-btn:0 10px 28px rgba(239,111,31,0.35);
  --r-lg:26px; --r-full:999px; --ease:cubic-bezier(.4,0,.2,1);
  --f-sans:'Poppins',system-ui,sans-serif; --f-serif:'Playfair Display',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:var(--f-sans); background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.card{
  width:100%; max-width:420px;
  background:var(--card); border-radius:var(--r-lg);
  box-shadow:var(--shadow-md); border:1px solid var(--border);
  padding:clamp(28px,6vw,40px);
  text-align:center;
  animation:riseIn .5s var(--ease);
}
@keyframes riseIn{ from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }

.icon-badge{
  width:64px;height:64px; margin:0 auto 18px;
  border-radius:50%; background:var(--orange-pale); color:var(--orange);
  display:flex; align-items:center; justify-content:center; font-size:1.6rem;
}
h1{ font-family:var(--f-serif); font-size:1.5rem; font-weight:600; margin-bottom:8px; }
.sub{ color:var(--muted); font-size:.9rem; line-height:1.55; margin-bottom:26px; }

.pin-form{ display:flex; flex-direction:column; gap:16px; }
.pin-label{
  display:block; text-align:left;
  font-size:.76rem; font-weight:600; color:var(--muted);
  text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px;
}
.pin-input{
  width:100%; text-align:center;
  font-family:var(--f-serif); font-size:2rem; font-weight:600; letter-spacing:14px;
  padding:16px 8px 16px 22px;
  border:2px solid var(--border); border-radius:var(--r-lg);
  background:var(--bg); color:var(--text);
  outline:none; transition:border-color .2s var(--ease), box-shadow .2s var(--ease);
}
.pin-input:focus{ border-color:var(--orange); box-shadow:0 0 0 4px var(--orange-pale); }
.pin-input.error{ border-color:var(--danger); }
.pin-input:disabled{ opacity:.6; }

.error-box{
  display:flex; align-items:center; gap:10px; text-align:left;
  background:var(--danger-bg); border:1px solid rgba(224,67,43,.2);
  border-radius:14px; padding:12px 14px; font-size:.85rem; color:var(--danger);
  margin-bottom:22px; animation:shake .35s var(--ease);
}
@keyframes shake{
  0%,100%{ transform:translateX(0); }
  25%{ transform:translateX(-5px); }
  75%{ transform:translateX(5px); }
}
.error-box i{ flex-shrink:0; }

.verify-btn{
  width:100%; border:none; border-radius:var(--r-full);
  background:linear-gradient(135deg,var(--orange-light),var(--orange) 60%,var(--orange-deep));
  color:#fff; font-family:var(--f-sans); font-size:1rem; font-weight:600;
  padding:16px; cursor:pointer; box-shadow:var(--shadow-btn);
  min-height:52px; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .2s var(--ease), box-shadow .2s var(--ease), opacity .2s;
}
.verify-btn:hover:not(:disabled){ transform:translateY(-2px); }
.verify-btn:active:not(:disabled){ transform:scale(.97); }
.verify-btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

.back-link{
  display:inline-flex; align-items:center; gap:6px;
  margin-top:22px; font-size:.85rem; color:var(--muted); text-decoration:none;
  transition:color .2s var(--ease);
}
.back-link:hover{ color:var(--orange); }

:focus-visible{ outline:2px solid var(--orange); outline-offset:2px; }
@media(prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important} }
</style>
</head>
<body>
<div class="card">
  <div class="icon-badge" aria-hidden="true"><i class="fa-solid fa-key"></i></div>
  <h1>Enter Table PIN</h1>
  <p class="sub">Table {{ table_number }} is already in a dining session. Ask anyone at the table for the 4-digit PIN to join.</p>

  {% if error %}
  <div class="error-box" role="alert">
    <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form method="POST" action="{% url 'join_table' table_number=table_number %}" class="pin-form" autocomplete="off">
    {% csrf_token %}
    <div>
      <label class="pin-label" for="pinInput">Table PIN</label>
      <input
        type="text" inputmode="numeric" pattern="[0-9]*" maxlength="4"
        id="pinInput" name="pin" class="pin-input{% if error %} error{% endif %}"
        placeholder="----" autocomplete="off" autofocus required
        {% if locked_out %}disabled{% endif %}
      >
    </div>
    <button type="submit" class="verify-btn" {% if locked_out %}disabled{% endif %}>
      <i class="fa-solid fa-check" aria-hidden="true"></i> Verify
    </button>
  </form>

  <a href="{% url 'landing' table_number=table_number %}" class="back-link">
    <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back
  </a>
</div>
</body>
</html>
